version: '3.8'

services:
  # --- PostgreSQL Database ---
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fair_dispatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Redis (Broker + Cache + Artifact Store) ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- FastAPI Web Server ---
  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/fair_dispatch
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=development
      - DEBUG=true
      - SYNC_ALLOCATION_ENABLED=true
    volumes:
      - .:/app
      - model_storage:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Celery Worker (runs LangGraph pipeline) ---
  worker:
    build: .
    command: celery -A app.core.celery_app:celery_app worker --loglevel=info --concurrency=4 -Q allocation
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/fair_dispatch
      - SYNC_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/fair_dispatch
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=development
    volumes:
      - .:/app
      - model_storage:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Celery Beat (periodic task scheduler) ---
  beat:
    build: .
    command: celery -A app.core.celery_app:celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/fair_dispatch
      - SYNC_DATABASE_URL=postgresql://postgres:postgres@postgres:5432/fair_dispatch
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Flower (Celery monitoring dashboard) ---
  flower:
    build: .
    command: celery -A app.core.celery_app:celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

volumes:
  pgdata:
  redisdata:
  model_storage:
